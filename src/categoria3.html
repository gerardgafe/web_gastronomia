<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Recetas Caseras</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="categoria.scss">
  <script type="module" src="categoria.js"></script>
  <script type="module" src="common.js"></script>
</head>

<body>

  <!-- Cabecera -->
  <include src="./src/componentes/header.html"></include>

  <!-- Seccion -->
  <section class="recetas">

    <div class="recetas-grid">

      <article class="card-style">
        <img src="imagenes/categoria3/albondigas_bacalao.jpg">
        <h3>Albondigas de bacalao</h3>
        <p><i class="fa-regular fa-clock" aria-hidden="true"></i> 10 min</p>
        <a class="no-disponible" aria-label="reteta de albondigas de bacalao no disponible">
          No disponible
        </a>
      </article>

      <article class="card-style">
        <img src="imagenes/categoria3/rape_vapor.jpg">
        <h3>Rape al vapor</h3>
        <p><i class="fa-regular fa-clock" aria-hidden="true"></i> 15 min</p>
        <a class="no-disponible" aria-label="reteta de rape al vapor no disponible">
          No disponible
        </a>
      </article>

      <article class="card-style">
        <img src="imagenes/categoria3/besugo_horno.jpg">
        <h3>Besugo al horno</h3>
        <p><i class="fa-regular fa-clock" aria-hidden="true"></i> 15 min</p>
        <a class="no-disponible" aria-label="reteta de besugo al horno no disponible">
          No disponible
        </a>
      </article>

      <article class="card-style">
        <img src="imagenes/categoria3/salmon_teriyaki.jpg">
        <h3>Salmón teriyaki</h3>
        <p><i class="fa-regular fa-clock" aria-hidden="true"></i> 10 min</p>
        <a class="no-disponible" aria-label="reteta de salmon teriyaki no disponible">
          No disponible
        </a>
      </article>

      <article class="card-style">
        <img src="imagenes/categoria3/bacalao_lagareiro.jpg">
        <h3>Bacalao al Lagareiro</h3>
        <p><i class="fa-regular fa-clock" aria-hidden="true"></i> 45 min</p>
        <a class="no-disponible" aria-label="reteta de bacalao a lagareiro no disponible">
          No disponible
        </a>
      </article>

    </div>

  </section>

  <!-- Scroll -->
  <include src="./src/componentes/button_scroll.html"></include>

  <!-- Footer -->
  <include src="./src/componentes/footer.html"></include>

</body>

</html>
