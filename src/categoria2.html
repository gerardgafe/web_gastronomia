<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Recetas Caseras</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/categoria.scss">
  <script type="module" src="./scripts/categoria.js"></script>
  <script type="module" src="./scripts/common.js"></script>
</head>

<body>

  <!-- Cabecera -->
  <include src="./src/componentes/header.html"></include>

  <main>

    <!-- Seccion -->
    <section class="recetas">

      <div class="recetas-grid">

        <article class="card-style">
          <img src="imagenes/categoria2/ternera_salsa.jpg">
          <h3>Ternera en salsa</h3>
          <p><i class="fa-regular fa-clock" aria-hidden="true"></i> 10 min</p>
          <a class="no-disponible" aria-label="reteta de ternera en salsa no disponible">
            No disponible
          </a>
        </article>

        <article class="card-style">
          <img src="imagenes/categoria2/pollo_almendras.jpg">
          <h3>Pollo con almendras</h3>
          <p><i class="fa-regular fa-clock" aria-hidden="true"></i> 15 min</p>
          <a class="no-disponible" aria-label="reteta de pollo con almendras no disponible">
            No disponible
          </a>
        </article>

        <article class="card-style">
          <img src="imagenes/categoria2/solomillo_esparragos.jpg">
          <h3>Solomillo con esparragos</h3>
          <p><i class="fa-regular fa-clock" aria-hidden="true"></i> 15 min</p>
          <a class="no-disponible" aria-label="reteta de solomillo con esparragos no disponible">
            No disponible
          </a>
        </article>

        <article class="card-style">
          <img src="imagenes/categoria2/entrecot_pimienta.jpg">
          <h3>Entrecot a la pimienta</h3>
          <p><i class="fa-regular fa-clock" aria-hidden="true"></i> 10 min</p>
          <a class="no-disponible" aria-label="reteta de entrecot a la pimienta no disponible">
            No disponible
          </a>
        </article>

        <article class="card-style">
          <img src="imagenes/categoria2/costillas_bbq.jpg">
          <h3>Costillas BBQ</h3>
          <p><i class="fa-regular fa-clock" aria-hidden="true"></i> 45 min</p>
          <a class="no-disponible" aria-label="reteta de costillas bbq no disponible">
            No disponible
          </a>
        </article>

      </div>

    </section>

    <!-- Boton scroll -->
    <include src="./src/componentes/button_scroll.html"></include>

  </main>

  <!-- Footer -->
  <include src="./src/componentes/footer.html"></include>

</body>

</html>
